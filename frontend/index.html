<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Predictor - ML Project</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏦 Loan Approval Predictor</h1>
            <p>Powered by Machine Learning (Logistic Regression)</p>
        </header>

        <main class="form-section">
            <form id="loan-form" class="loan-form">
                <div class="form-group">
                    <label for="dependents">Dependents:</label>
                    <select id="dependents" required>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3+">3+</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="education">Education:</label>
                    <select id="education" required>
                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="self_employed">Self Employed:</label>
                    <select id="self_employed" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="credit_history">Credit History (0-1):</label>
                    <input type="number" id="credit_history" min="0" max="1" step="0.1" value="1" required>
                </div>

                <div class="form-group">
                    <label for="property_area">Property Area:</label>
                    <select id="property_area" required>
                        <option value="Rural">Rural</option>
                        <option value="Semiurban">Semiurban</option>
                        <option value="Urban">Urban</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="loan_amount_term">Loan Amount Term (months):</label>
                    <input type="number" id="loan_amount_term" min="1" max="480" value="360" required>
                </div>

                <div class="form-group">
                    <label for="applicant_income">Applicant Income (₹):</label>
                    <input type="number" id="applicant_income" min="0" value="5000" required>
                </div>

                <div class="form-group">
                    <label for="coapplicant_income">Coapplicant Income (₹):</label>
                    <input type="number" id="coapplicant_income" min="0" value="0" required>
                </div>

                <div class="form-group">
                    <label for="loan_amount">Loan Amount (₹):</label>
                    <input type="number" id="loan_amount" min="1" value="100000" required>
                </div>

                <button type="submit" class="predict-btn">🚀 Predict Loan Approval</button>
            </form>

            <div id="result" class="result"></div>
        </main>

        <section class="plot-section">
            <button id="plot-btn" class="plot-btn">📊 View Dataset Visualization</button>
            <div id="plot" class="plot-container"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
